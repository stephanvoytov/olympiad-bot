<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Олимпиады</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.08);
      --surface-raised: rgba(255,255,255,0.07);
      --primary: #8b7cf7;
      --primary-glow: rgba(139,124,247,0.3);
      --primary-dim: #6d5ed6;
      --green: #34d399;
      --green-bg: rgba(52,211,153,0.12);
      --yellow: #fbbf24;
      --yellow-bg: rgba(251,191,36,0.12);
      --orange: #fb923c;
      --orange-bg: rgba(251,146,60,0.12);
      --red: #f87171;
      --red-bg: rgba(248,113,113,0.12);
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --text-muted: #475569;
      --border: rgba(255,255,255,0.06);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 90px;
      -webkit-font-smoothing: antialiased;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(139,124,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(52,211,153,0.05) 0%, transparent 50%);
    }

    .header {
      padding: 24px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(180deg, rgba(15,15,26,1) 60%, rgba(15,15,26,0));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .header h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 40%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .subtitle { color: var(--text-dim); font-size: 14px; margin-top: 2px; font-weight: 400; }

    .stats-row { display: flex; gap: 8px; padding: 0 20px 16px; overflow-x: auto; scrollbar-width: none; }
    .stats-row::-webkit-scrollbar { display: none; }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      min-width: 72px;
      text-align: center;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .stat-card .num { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .stat-card .label { font-size: 10px; color: var(--text-dim); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }

    .tabs {
      display: flex; gap: 6px; padding: 0 20px 14px;
    }
    .tab {
      flex: 1; text-align: center; padding: 11px; border-radius: var(--radius-sm);
      background: var(--surface); cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all 0.25s ease; border: 1px solid var(--border); color: var(--text-dim);
      position: relative; overflow: hidden;
    }
    .tab:active { transform: scale(0.97); }
    .tab.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 4px 20px var(--primary-glow); }
    .tab .count {
      display: inline-block; background: rgba(255,255,255,0.12);
      border-radius: 10px; padding: 0 7px; font-size: 11px; margin-left: 4px; font-weight: 600;
    }
    .tab.active .count { background: rgba(255,255,255,0.25); }

    .content { padding: 0 20px; }

    .search-bar { display: flex; gap: 8px; margin-bottom: 14px; }
    .search-bar input {
      flex: 1; padding: 12px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-size: 15px; outline: none; transition: all 0.25s ease;
    }
    .search-bar input::placeholder { color: var(--text-muted); }
    .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }

    .filter-chips {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .chip {
      padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-dim); cursor: pointer;
      font-size: 12px; font-weight: 500; transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .chip:hover { border-color: var(--text-muted); color: var(--text); }
    .chip:active { transform: scale(0.96); }
    .chip.active { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 2px 12px var(--primary-glow); }

    .olympiad-card {
      background: var(--surface-raised);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      border: 1px solid var(--border);
      position: relative;
      animation: cardIn 0.35s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .olympiad-card:active { transform: scale(0.99); }
    .olympiad-card:hover { background: var(--surface-hover); border-color: rgba(255,255,255,0.1); }
    .olympiad-card .row1 {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 8px;
    }
    .olympiad-card .row1 > div:first-child { flex: 1; min-width: 0; }
    .olympiad-card .row1 > div:last-child { flex-shrink: 0; }
    .olympiad-card .name { font-size: 16px; font-weight: 600; line-height: 1.3; }
    .olympiad-card .organizer { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .olympiad-card .meta {
      display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; align-items: center;
    }
    .olympiad-card .deadline-badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 10px; padding: 5px 12px;
      border-radius: var(--radius-xs); font-size: 11px; font-weight: 600;
    }
    .deadline-urgent { background: var(--red-bg); color: var(--red); }
    .deadline-soon { background: var(--yellow-bg); color: var(--yellow); }
    .deadline-later { background: var(--green-bg); color: var(--green); }

    .badge {
      font-size: 10px; padding: 3px 9px; border-radius: 20px;
      font-weight: 600; letter-spacing: 0.2px;
      white-space: nowrap;
    }
    .badge.level { background: var(--primary-dim); color: #fff; }
    .badge.bvi { background: var(--green-bg); color: var(--green); }
    .badge.points { background: rgba(251,146,60,0.15); color: var(--orange); }
    .badge.extra { background: rgba(148,163,184,0.12); color: var(--text-dim); }

    .profile-checkbox {
      transition: background 0.15s ease; border-radius: 6px; padding: 6px 8px !important;
    }
    .profile-checkbox:hover { background: var(--surface-hover); }

    .status-indicator {
      display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500;
    }
    .status-indicator svg { flex-shrink: 0; }

    .stage-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 13px; gap: 8px;
    }
    .stage-item:last-child { border: none; }
    .stage-item .date { color: var(--text-muted); font-size: 12px; white-space: nowrap; }
    .stage-item .stage-name { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }

    .empty-state {
      text-align: center; padding: 48px 20px; color: var(--text-dim);
    }
    .empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .empty-state p { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: var(--radius-sm);
      border: none; cursor: pointer; font-size: 14px; font-weight: 600;
      transition: all 0.2s ease; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; box-shadow: 0 2px 12px var(--primary-glow); }
    .btn-primary:hover { background: var(--primary-dim); box-shadow: 0 4px 20px var(--primary-glow); }
    .btn-outline {
      background: transparent; border: 1px solid var(--primary); color: var(--primary);
    }
    .btn-outline:hover { background: var(--primary-glow); }
    .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .btn-danger:hover { background: rgba(248,113,113,0.2); }
    .btn-success { background: var(--green-bg); color: var(--green); }
    .btn-sm { padding: 7px 14px; font-size: 12px; border-radius: var(--radius-xs); }
    .btn-link {
      display: inline-flex; align-items: center; gap: 4px;
      color: var(--primary); text-decoration: none; font-size: 13px; font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn-link:hover { opacity: 0.8; }

    .add-btn {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dim) 100%);
      color: #fff; border: none;
      cursor: pointer; box-shadow: 0 6px 24px var(--primary-glow);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s ease; z-index: 5;
    }
    .add-btn:hover { transform: scale(1.08); box-shadow: 0 8px 32px var(--primary-glow); }
    .add-btn:active { transform: scale(0.95); }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100; justify-content: center; align-items: flex-end;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      opacity: 0; transition: opacity 0.25s ease;
    }
    .modal-overlay.open { display: flex; opacity: 1; }
    .modal-overlay.open .modal {
      animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal {
      background: linear-gradient(180deg, rgba(30,30,50,1) 0%, rgba(20,20,35,1) 100%);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px; width: 100%; max-width: 500px;
      max-height: 85vh; overflow-y: auto;
      border-top: 1px solid var(--border);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
    }
    .modal-header h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; line-height: 1.3; }
    .modal-close {
      background: var(--surface); border: none; color: var(--text-dim);
      cursor: pointer; padding: 8px; border-radius: var(--radius-xs);
      transition: all 0.2s; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: var(--surface-hover); color: var(--text); }

    .status-selector {
      display: flex; gap: 6px; flex-wrap: wrap; margin: 12px 0;
    }
    .status-btn {
      padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-dim); cursor: pointer;
      font-size: 12px; font-weight: 500; transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .status-btn:hover { border-color: var(--text-muted); color: var(--text); }
    .status-btn:active { transform: scale(0.96); }
    .status-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 2px 12px var(--primary-glow); }

    .section-title {
      font-size: 13px; font-weight: 700; margin: 16px 0 10px;
      display: flex; align-items: center; gap: 6px;
      text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim);
    }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
    .form-group input, .form-group select {
      width: 100%; padding: 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-size: 14px; outline: none; transition: all 0.25s;
    }
    .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    .form-group input[type="date"] { color-scheme: dark; }

    .toast {
      position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%);
      background: rgba(30,30,50,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: #fff; padding: 12px 24px;
      border-radius: 24px; font-size: 13px; font-weight: 500;
      z-index: 200; display: none; white-space: nowrap;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .toast.show {
      display: block;
      animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes toastIn {
      from { transform: translateX(-50%) translateY(12px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0;
    }
    .info-item { font-size: 13px; }
    .info-item .label { color: var(--text-dim); font-size: 11px; }

    .countdown { font-size: 12px; font-weight: 600; margin-top: 4px; }
    .countdown.urgent { color: var(--red); }
    .countdown.soon { color: var(--yellow); }
    .countdown.normal { color: var(--green); }
  </style>
</head>
<body>
  <div class="header">
    <h1>Олимпиады</h1>
    <p class="subtitle" id="subtitle">Загрузка...</p>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="tabs">
    <button class="tab active" data-tab="my">Мои <span class="count" id="myCount">0</span></button>
    <button class="tab" data-tab="catalog">Каталог <span class="count" id="catCount">0</span></button>
  </div>

  <div class="content" id="tabContent"></div>

  <button class="add-btn" id="addBtn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <div class="toast" id="toast"></div>

  <!-- Детальная модалка -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">Олимпиада</h2>
        <button class="modal-close" onclick="closeModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Модалка добавления из каталога -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Добавить олимпиаду</h2>
        <button class="modal-close" onclick="closeAddModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="addModalBody">
        <div class="search-bar">
          <input type="text" id="catalogSearch" placeholder="Поиск..." oninput="searchCatalog()">
        </div>
        <div class="filter-chips">
          <button class="chip active" onclick="filterAddCatalog('all', this)">Все</button>
          <button class="chip" onclick="filterAddCatalog('level1', this)">Ур. 1</button>
          <button class="chip" onclick="filterAddCatalog('level2', this)">Ур. 2</button>
          <button class="chip" onclick="filterAddCatalog('level3', this)">Ур. 3</button>
        </div>
        <div id="catalogList"></div>
      </div>
    </div>
  </div>

  <!-- Модалка добавления этапа -->
  <div class="modal-overlay" id="stageModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Добавить этап</h2>
        <button class="modal-close" onclick="closeStageModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="stageModalBody">
        <div class="form-group">
          <label>Название этапа</label>
          <input type="text" id="stageNameInput" placeholder="Регистрация, Отборочный тур...">
        </div>
        <div class="info-grid">
          <div class="form-group">
            <label>Дата начала</label>
            <input type="date" id="stageStartInput">
          </div>
          <div class="form-group">
            <label>Дата окончания</label>
            <input type="date" id="stageEndInput">
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-primary" onclick="submitStage()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Сохранить
          </button>
          <button class="btn btn-outline" onclick="closeStageModal()">Отмена</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const initData = Telegram.WebApp.initData;
    const TELEGRAM_ID = Telegram.WebApp.initDataUnsafe?.user?.id;
    const API = '/api';

    let tgUser = null;
    let myOlympiads = [];
    let catalog = [];
    let addFilter = 'all';
    let catalogProfileFilter = '';
    let currentDetailEntryId = null;

    // ========== SVG ICONS ==========
    const ICONS = {
      planned: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
      registered: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
      participating: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
      passed_round: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
      won: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>',
      external: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>',
      calendar: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
      delete: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>',
      plus: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
      check: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>',
      clock: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      search: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
      alert: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      close: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
    };

    // ========== XSS ЗАЩИТА ==========
    function esc(str) {
      var d = document.createElement('div');
      d.appendChild(document.createTextNode(str || ''));
      return d.innerHTML;
    }

    function statusIcon(status) {
      return '<span class="status-indicator" style="color:var(--' + (status === 'won' ? 'green' : status === 'registered' ? 'primary' : status === 'participating' ? 'yellow' : status === 'passed_round' ? 'orange' : 'text-dim') + ')">' + (ICONS[status] || ICONS.planned) + ' ' + statusLabel(status) + '</span>';
    }

    function statusLabel(s) {
      return { planned: 'Запланировано', registered: 'Зарегистрирован', participating: 'Участвую', passed_round: 'Прошёл этап', won: 'Победа' }[s] || s;
    }

    // ========== ОБЩИЙ ЗАГОЛОВОК ==========
    function authHeaders() {
      var h = {};
      if (initData) h['X-Telegram-Init-Data'] = initData;
      return h;
    }

    // ========== INIT ==========
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    async function init() {
      if (!TELEGRAM_ID) {
        document.getElementById('subtitle').textContent = 'Ошибка: не удалось получить данные Telegram';
        return;
      }
      try {
        const resp = await fetch(API + '/user/me', { headers: authHeaders() });
        tgUser = await resp.json();
        document.getElementById('subtitle').textContent = tgUser.full_name || tgUser.username || '';
        await loadData();
        renderTab('my');
      } catch(e) {
        console.error('Init error:', e);
        document.getElementById('subtitle').textContent = 'Ошибка загрузки';
      }
    }

    async function loadData() {
      const h = authHeaders();
      const [myResp, catResp, dashResp] = await Promise.all([
        fetch(API + '/my-olympiads', { headers: h }),
        fetch(API + '/olympiads'),
        fetch(API + '/dashboard', { headers: h })
      ]);
      myOlympiads = await myResp.json();
      catalog = await catResp.json();
      const dash = await dashResp.json();
      document.getElementById('myCount').textContent = myOlympiads.length;
      document.getElementById('catCount').textContent = catalog.length;
      renderStats(dash);
    }

    // ========== STATS ==========
    function renderStats(dash) {
      const row = document.getElementById('statsRow');
      const labels = {
        planned: 'Запланировано', registered: 'Зарегистрирован',
        participating: 'Участвую', passed_round: 'Прошёл этап', won: 'Победа'
      };
      var html = '<div class="stat-card"><div class="num">' + dash.total + '</div><div class="label">Всего</div></div>';
      for (var key in labels) {
        if (dash.by_status && dash.by_status[key]) {
          html += '<div class="stat-card"><div class="num">' + dash.by_status[key] + '</div><div class="label">' + labels[key] + '</div></div>';
        }
      }
      if (dash.upcoming_events && dash.upcoming_events.length) {
        html += '<div class="stat-card"><div class="num">' + dash.upcoming_events.length + '</div><div class="label">Ближайшие</div></div>';
      }
      row.innerHTML = html;
    }

    // ========== TABS ==========
    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        renderTab(tab.dataset.tab);
      });
    });

    function renderTab(tab) {
      if (tab === 'my') renderMyOlympiads();
      else renderCatalogContent();
    }

    // ========== CATALOG ==========
    function renderCatalogContent(profileFilter) {
      if (profileFilter !== undefined) catalogProfileFilter = profileFilter;
      const container = document.getElementById('tabContent');
      container.innerHTML =
        '<div class="search-bar"><input type="text" id="searchInput" placeholder="Поиск..." oninput="debouncedSearch()"></div>' +
        '<div class="filter-chips" id="catalogChips"></div>' +
        '<div id="catalogResults"></div>';
      renderCatalogChips();
      renderCatalogResults();
    }

    function renderCatalogChips() {
      const el = document.getElementById('catalogChips');
      if (!el) return;
      var chips = ['', 'математика', 'информатика', 'физика', 'биология', 'химия'];
      var labels = { '': 'Все', 'математика': 'Математика', 'информатика': 'Информатика', 'физика': 'Физика', 'биология': 'Биология', 'химия': 'Химия' };
      el.innerHTML = chips.map(function(c) {
        var active = catalogProfileFilter === c || (!catalogProfileFilter && !c);
        return '<button class="chip' + (active ? ' active' : '') + '" data-profile="' + c + '" onclick="filterCatalogProfile(\'' + c + '\')">' + labels[c] + '</button>';
      }).join('');
    }

    function filterCatalogProfile(profile) {
      catalogProfileFilter = profile;
      renderCatalogChips();
      renderCatalogResults();
    }

    function getProfileNames(olympiad) {
      return (olympiad.profiles || []).map(function(p) { return p.name; });
    }

    function profileMatchesFilter(profiles, filter) {
      if (!filter) return true;
      filter = filter.toLowerCase();
      return profiles.some(function(p) { return p.name.toLowerCase().indexOf(filter) !== -1 || p.slug.toLowerCase().indexOf(filter) !== -1; });
    }

    function renderCatalogResults() {
      const el = document.getElementById('catalogResults');
      if (!el) return;
      var q = '';
      var inp = document.getElementById('searchInput');
      if (inp) q = inp.value.toLowerCase();

      var items = catalog.slice();
      if (catalogProfileFilter) {
        items = items.filter(function(o) { return profileMatchesFilter(o.profiles, catalogProfileFilter); });
      }
      if (q) {
        items = items.filter(function(o) { return o.name.toLowerCase().indexOf(q) !== -1 || (o.organizer || '').toLowerCase().indexOf(q) !== -1; });
      }
      items.sort(function(a, b) { return a.name.localeCompare(b.name); });

      el.innerHTML = items.length
        ? items.map(function(o) {
            var allProfiles = o.profiles || [];
            var hasBvi = allProfiles.some(function(p) { return p.benefits && p.benefits['БВИ']; });
            var has100 = allProfiles.some(function(p) { return p.benefits && p.benefits['100_баллов']; });
            var levels = [...new Set(allProfiles.map(function(p) { return p.level; }).filter(Boolean))].sort().join(', ');
            var profHtml = '<div class="profiles-list" style="margin-top:10px">';
            allProfiles.forEach(function(p) {
              var levelBadge = p.level ? '<span class="badge level">Ур. ' + p.level + '</span>' : '';
              var bviBadge = p.benefits && p.benefits['БВИ'] ? '<span class="badge bvi">БВИ</span>' : '';
              var ptsBadge = p.benefits && p.benefits['100_баллов'] ? '<span class="badge points">100</span>' : '';
              profHtml += '<label class="profile-checkbox" style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;cursor:pointer">' +
                '<input type="checkbox" class="profile-chk" data-oid="' + esc(o.id) + '" data-slug="' + esc(p.slug) + '" style="accent-color:var(--primary)"> ' +
                '<span>' + esc(p.name) + '</span> ' + levelBadge + ' ' + bviBadge + ' ' + ptsBadge +
                '</label>';
            });
            profHtml += '</div>';
            return '<div class="olympiad-card" style="cursor:default">' +
              '<div class="row1"><div><div class="name">' + esc(o.name) + '</div><div class="organizer">' + esc(o.organizer || '') + '</div></div>' +
              (levels ? '<div><span class="badge level">Ур. ' + esc(levels) + '</span></div>' : '') + '</div>' +
              (hasBvi || has100 ? '<div class="meta" style="margin-top:6px">' + (hasBvi ? '<span class="badge bvi">БВИ</span>' : '') + (has100 ? '<span class="badge points">100 баллов</span>' : '') + '</div>' : '') +
              profHtml +
              '</div>';
          }).join('') +
          '<button class="btn btn-primary" style="width:100%;margin-top:4px;justify-content:center" onclick="addSelectedProfiles()">' + ICONS.plus + ' Добавить выбранные</button>'
        : '<div class="empty-state"><h3>Ничего не найдено</h3></div>';
    }

    var _searchTimer = null;
    function debouncedSearch() {
      if (_searchTimer) clearTimeout(_searchTimer);
      _searchTimer = setTimeout(function() { renderCatalogResults(); }, 150);
    }

    // ========== ADD FROM CATALOG ==========
    document.getElementById('addBtn').addEventListener('click', function() {
      document.getElementById('addModal').classList.add('open');
      searchCatalog();
    });

    function closeAddModal() {
      document.getElementById('addModal').classList.remove('open');
    }

    function filterAddCatalog(level, btn) {
      document.querySelectorAll('#addModal .chip').forEach(function(c) { c.classList.remove('active'); });
      btn.classList.add('active');
      addFilter = level;
      searchCatalog();
    }

    function searchCatalog() {
      var q = document.getElementById('catalogSearch').value.toLowerCase();
      var items = q
        ? catalog.filter(function(o) { return o.name.toLowerCase().indexOf(q) !== -1 || (o.organizer || '').toLowerCase().indexOf(q) !== -1; })
        : catalog.slice();

      if (addFilter === 'level1') items = items.filter(function(o) { return (o.profiles || []).some(function(p) { return p.level === 1; }); });
      else if (addFilter === 'level2') items = items.filter(function(o) { return (o.profiles || []).some(function(p) { return p.level === 2; }); });
      else if (addFilter === 'level3') items = items.filter(function(o) { return (o.profiles || []).some(function(p) { return p.level === 3; }); });

      document.getElementById('catalogList').innerHTML = items.length
        ? items.map(function(o) {
            var allProfiles = o.profiles || [];
            return '<div class="olympiad-card" onclick="openAddDetailModal(catalog.find(function(x) { return x.id === \'' + esc(o.id) + '\'; }))">' +
              '<div class="name">' + esc(o.name) + '</div><div class="organizer">' + esc(o.organizer || '') + '</div>' +
              '<div class="meta">' +
              allProfiles.map(function(p) {
                var badges = '<span class="badge level">Ур. ' + p.level + '</span>' + (p.benefits && p.benefits['БВИ'] ? '<span class="badge bvi">БВИ</span>' : '') + (p.benefits && p.benefits['100_баллов'] ? '<span class="badge points">100</span>' : '');
                return '<div style="font-size:12px;color:var(--text);margin:2px 0">' + esc(p.name) + ' ' + badges + '</div>';
              }).join('') +
              '</div></div>';
          }).join('')
        : '<div class="empty-state">Ничего не найдено</div>';
    }

    function openAddDetailModal(o) {
      var modal = document.getElementById('addModal');
      var allProfiles = o.profiles || [];

      var profilesHtml = allProfiles.map(function(p) {
        var stageHtml = (p.stages || []).length
          ? p.stages.map(function(s) {
              var dateStr = [s.date_start, s.date_end].filter(Boolean).map(function(d) { return formatDate(d); }).join(' - ');
              return '<div class="stage-item"><div class="stage-name"><span style="color:var(--text-dim)">' + ICONS.clock + '</span>' + esc(s.name) + '</div><div class="date">' + esc(s.typical_date || dateStr || '') + '</div></div>';
            }).join('')
          : '<div style="color:var(--text-dim);font-size:13px">Даты уточняются</div>';

        var benefitHtml = '';
        if (p.benefits) {
          var benefitEntries = Object.entries(p.benefits);
          if (benefitEntries.length) {
            benefitHtml = benefitEntries.map(function(kv) {
              return '<div style="font-size:12px;color:var(--text-dim)">- ' + kv[0].replace('_', ' ') + ': ' + (Array.isArray(kv[1]) ? kv[1].join(', ') : kv[1]) + '</div>';
            }).join('');
          }
        }

        return '<div style="background:#1a1a2e;border-radius:8px;padding:10px;margin-bottom:8px">' +
          '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">' +
          '<span class="badge level">Ур. ' + p.level + '</span> ' +
          renderBenefitBadges(p.benefits) +
          '</div>' +
          '<strong style="font-size:13px">' + esc(p.name) + '</strong>' +
          '<div class="section-title" style="margin-top:6px">Этапы</div>' + stageHtml +
          (benefitHtml ? '<div style="margin-top:6px">' + benefitHtml + '</div>' : '') +
          '<button class="btn btn-primary btn-sm" style="width:100%;margin-top:8px;justify-content:center" onclick="addOlympiad(\'' + esc(o.id) + '\', \'' + esc(p.slug) + '\')">' + ICONS.plus + ' Добавить</button>' +
          '</div>';
      }).join('');

      document.getElementById('addModalBody').innerHTML =
        '<div style="margin-bottom:12px">' +
          '<h3 style="font-size:18px;font-weight:700;margin-bottom:4px">' + esc(o.name) + '</h3>' +
          '<div style="font-size:13px;color:var(--text-dim)">' + esc(o.organizer || '') + '</div></div>' +
        '<div class="section-title">Выберите направление</div>' +
        profilesHtml +
        '<div style="display:flex;gap:8px;margin-top:8px">' +
          '<a class="btn btn-outline btn-sm" href="' + esc(o.registration_url || o.url) + '" target="_blank" rel="noopener">' + ICONS.external + ' Сайт</a></div>';
      modal.classList.add('open');
    }

    function addSelectedProfiles() {
      var checked = document.querySelectorAll('.profile-chk:checked');
      var count = 0;
      checked.forEach(function(cb) {
        addOlympiad(cb.getAttribute('data-oid'), cb.getAttribute('data-slug'));
        count++;
      });
      if (count === 0) { showToast('Выберите хотя бы один профиль'); }
    }

    async function addOlympiad(olympiadId, profileSlug) {
      try {
        const h = authHeaders();
        h['Content-Type'] = 'application/json';
        const resp = await fetch(API + '/my-olympiads/add', {
          method: 'POST',
          headers: h,
          body: JSON.stringify({ olympiad_id: olympiadId, profile_slug: profileSlug })
        });
        if (!resp.ok) {
          var err = await resp.json();
          showToast(err.detail || 'Ошибка');
          return;
        }
        showToast('Олимпиада добавлена');
        closeAddModal();
        await loadData();
        renderTab('my');
      } catch(e) {
        showToast('Ошибка при добавлении');
      }
    }

    // ========== MY OLYMPIADS ==========
    function renderMyOlympiads() {
      var container = document.getElementById('tabContent');
      if (!myOlympiads.length) {
        container.innerHTML =
          '<div class="empty-state"><h3>Нет добавленных олимпиад</h3><p>Нажмите +, чтобы добавить из каталога</p></div>';
        return;
      }

      var order = { won: 0, passed_round: 1, registered: 2, participating: 3, planned: 4 };
      var sorted = myOlympiads.slice().sort(function(a, b) { return (order[a.status] || 99) - (order[b.status] || 99); });

      container.innerHTML = sorted.map(function(o) {
        var nextStage = findNextStage(o.stages);
        var daysLeft = nextStage && nextStage.date_start ? daysUntil(nextStage.date_start) : null;
        return '<div class="olympiad-card" onclick="openDetail(' + o.id + ')">' +
          '<div class="row1"><div><div class="name">' + statusIcon(o.status) + ' ' + esc(o.name) + '</div>' +
          (o.profile_name ? '<div class="organizer">' + esc(o.profile_name) + '</div>' : '') +
          '<div class="organizer">' + esc(o.organizer || '') + '</div></div>' +
          '<div>' + (o.level ? '<span class="badge level">Ур. ' + esc(o.level) + '</span>' : '') + '</div></div>' +
          '<div class="meta">' +
          renderBenefitBadges(o.benefits) + '</div>' +
          (nextStage ? renderNextStageInfo(nextStage, daysLeft) : '') +
          (o.registration_url ? '<a class="btn-link" href="' + esc(o.registration_url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + ICONS.external + ' Регистрация</a>' : '') +
          '</div>';
      }).join('');
    }

    function findNextStage(stages) {
      var upcoming = stages.filter(function(s) { return !s.is_completed && (s.date_start || s.date_end); });
      if (!upcoming.length) return null;
      return upcoming.sort(function(a, b) { return (a.date_start || a.date_end || '').localeCompare(b.date_start || b.date_end || ''); })[0];
    }

    function renderNextStageInfo(stage, daysLeft) {
      var dateStr = formatDate(stage.date_start || stage.date_end);
      var cls = 'deadline-later';
      var urgency = '';
      if (daysLeft !== null) {
        if (daysLeft < 0) { cls = 'deadline-urgent'; urgency = 'ПРОШЁЛ'; }
        else if (daysLeft <= 7) { cls = 'deadline-urgent'; urgency = daysLeft + ' дн.'; }
        else if (daysLeft <= 30) { cls = 'deadline-soon'; urgency = daysLeft + ' дн.'; }
      }
      return '<div class="deadline-badge ' + cls + '">' + ICONS.clock + ' ' + esc(stage.name) + ': ' + dateStr + (urgency ? ' (' + urgency + ')' : '') + '</div>';
    }

    // ========== DETAIL MODAL ==========
    async function openDetail(entryId) {
      var o = myOlympiads.find(function(x) { return x.id == entryId; });
      if (!o) return;
      currentDetailEntryId = entryId;

      document.getElementById('modalTitle').textContent = o.name;
      document.getElementById('detailModal').classList.add('open');

      var stagesHtml = o.stages.map(function(s) {
        var dateStr = [s.date_start, s.date_end].filter(Boolean).map(function(d) { return formatDate(d); }).join(' - ');
        var days = s.date_start ? daysUntil(s.date_start) : null;
        var daysStr = '';
        if (days !== null && !s.is_completed) {
          if (days < 0) daysStr = '<span style="color:var(--red);font-size:11px">Просрочено</span>';
          else if (days <= 7) daysStr = '<span style="color:var(--red);font-size:11px">' + days + ' дн.</span>';
          else daysStr = '<span style="color:var(--text-dim);font-size:11px">' + days + ' дн.</span>';
        }
        return '<div class="stage-item"><div class="stage-name"><span style="color:' + (s.is_completed ? 'var(--green)' : 'var(--yellow)') + '">' + (s.is_completed ? ICONS.check : ICONS.clock) + '</span>' + esc(s.name) + (s.result ? '<span style="color:var(--green);font-size:11px"> (' + esc(s.result) + ')</span>' : '') + '</div><div style="text-align:right"><div class="date">' + (dateStr || '-') + '</div>' + daysStr + '</div></div>';
      }).join('');

      document.getElementById('modalBody').innerHTML =
        '<div style="margin-bottom:10px">' +
        (o.level ? '<span class="badge level">Ур. ' + esc(o.level) + '</span>' : '') +
        (o.profile_name ? '<span class="badge" style="background:#2d3748;color:var(--text)">' + esc(o.profile_name) + '</span>' : '') +
        renderBenefitBadges(o.benefits) + '</div>' +
        '<div style="font-size:13px;color:var(--text-dim);margin-bottom:4px">' + esc(o.organizer || '') + '</div>' +
        (o.registration_url ? '<a class="btn-link" href="' + esc(o.registration_url) + '" target="_blank" rel="noopener">' + ICONS.external + ' Ссылка на регистрацию</a>' : '') +
        '<div class="section-title">Статус</div><div class="status-selector">' +
        ['planned','registered','participating','passed_round','won'].map(function(key) {
          return '<button class="status-btn ' + (o.status === key ? 'active' : '') + '" onclick="updateStatus(' + o.id + ", '" + key + "')" + '">' + statusLabel(key) + '</button>';
        }).join('') + '</div>' +
        '<div class="section-title">Этапы</div>' +
        '<div style="margin:6px 0 10px"><button class="btn btn-outline btn-sm" onclick="openStageModal(' + o.id + ')">' + ICONS.plus + ' Добавить этап</button></div>' +
        (stagesHtml || '<div style="color:var(--text-dim);font-size:13px">Нет этапов</div>') +
        '<div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap">' +
        '<button class="btn btn-primary btn-sm" onclick="syncToCalendar(' + o.id + ')">' + ICONS.calendar + ' Календарь</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteOlympiad(' + o.id + ')">' + ICONS.delete + ' Удалить</button></div>';
    }

    async function updateStatus(entryId, status) {
      try {
        const h = authHeaders();
        h['Content-Type'] = 'application/json';
        await fetch(API + '/my-olympiads/' + entryId + '/status', {
          method: 'POST', headers: h,
          body: JSON.stringify({ status: status })
        });
        showToast('Статус обновлён');
        await loadData();
        openDetail(entryId);
      } catch(e) { showToast('Ошибка'); }
    }

    async function deleteOlympiad(entryId) {
      if (!confirm('Удалить олимпиаду из списка?')) return;
      try {
        const h = authHeaders();
        h['Content-Type'] = 'application/json';
        await fetch(API + '/my-olympiads/' + entryId, {
          method: 'DELETE', headers: h
        });
        showToast('Удалено');
        closeModal();
        await loadData();
        renderTab('my');
      } catch(e) { showToast('Ошибка'); }
    }

    // ========== STAGE MODAL (вместо prompt) ==========
    function openStageModal(entryId) {
      currentDetailEntryId = entryId;
      document.getElementById('stageNameInput').value = '';
      document.getElementById('stageStartInput').value = '';
      document.getElementById('stageEndInput').value = '';
      document.getElementById('stageModal').classList.add('open');
    }

    function closeStageModal() {
      document.getElementById('stageModal').classList.remove('open');
    }

    async function submitStage() {
      var name = document.getElementById('stageNameInput').value.trim();
      if (!name) { showToast('Введите название этапа'); return; }
      var start = document.getElementById('stageStartInput').value || null;
      var end = document.getElementById('stageEndInput').value || null;

      try {
        const h = authHeaders();
        h['Content-Type'] = 'application/json';
        await fetch(API + '/my-olympiads/' + currentDetailEntryId + '/stage', {
          method: 'POST', headers: h,
          body: JSON.stringify({ name: name, date_start: start, date_end: end })
        });
        showToast('Этап добавлен');
        closeStageModal();
        await loadData();
        openDetail(currentDetailEntryId);
      } catch(e) { showToast('Ошибка'); }
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('open');
    }

    async function syncToCalendar(entryId) {
      showToast('Google Calendar будет добавлен позже');
    }

    // ========== UTILS ==========
    function renderBenefitBadges(benefits) {
      if (!benefits) return '';
      var html = '';
      if (benefits['БВИ']) html += '<span class="badge bvi">БВИ</span>';
      if (benefits['100_баллов']) html += '<span class="badge points">100 баллов</span>';
      if (benefits['баллы_ДИ']) html += '<span class="badge extra">+ баллы</span>';
      return html;
    }

    function formatDate(iso) {
      if (!iso) return '';
      try {
        var d = new Date(iso);
        return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' });
      } catch(e) { return iso; }
    }

    function daysUntil(iso) {
      if (!iso) return null;
      try {
        var now = new Date();
        var target = new Date(iso);
        return Math.floor((target - now) / (1000 * 60 * 60 * 24));
      } catch(e) { return null; }
    }

    function showToast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t = setTimeout(function() { el.classList.remove('show'); }, 2500);
    }

    // ========== START ==========
    init();
  </script>
</body>
</html>
